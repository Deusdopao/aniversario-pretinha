<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Feliz Aniversário! ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('nós1.jpeg') no-repeat center center/cover;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .container {
      position: relative;
      text-align: center;
      color: white;
      z-index: 1;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 30px;
      letter-spacing: 3px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 30px;
      background-color: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #ff1e4d;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="container">
    <h1>FELIZ ANIVERSÁRIO MEU AMOR! ❤️</h1>
    <button class="btn" onclick="irParaPresente()">PRA VOCE!</button>
  </div>

  <script>
    function irParaPresente() {
      window.location.href = "presente.html";
    }
  </script>

</body>
</html>
